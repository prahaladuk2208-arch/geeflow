name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/geeflow[dev] -e packages/lulc-engine[dev]
      - name: Lint
        run: ruff check packages
      - name: Test geeflow
        run: pytest packages/geeflow/tests -q
      - name: Test lulc-engine
        run: pytest packages/lulc-engine/tests -q
